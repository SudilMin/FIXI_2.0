controller_manager:
  ros__parameters:
    update_rate: 30
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - arm_joint_1_yaw
      - arm_joint_2_shoulder
      - arm_joint_3_elbow
      - arm_joint_4_wrist
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

gripper_controller:
  ros__parameters:
    joints:
      - left_gripper_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

diff_drive_controller:
  ros__parameters:
    left_wheel_names: 
      - front_left_wheel_joint
      - rear_left_wheel_joint
    right_wheel_names: 
      - front_right_wheel_joint
      - rear_right_wheel_joint
    wheel_separation: 0.465 # base_width + wheel_width = 0.42 + 0.045
    wheel_radius: 0.075
    use_stamped_vel: false

    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]

    wheel_separation_multiplier: 1.0
    wheel_radius_multiplier: 1.0
    cmd_vel_timeout: 0.5
    
    # Base frame_id
    base_frame_id: base_footprint
    odom_frame_id: odom
    enable_odom_tf: true
    publish_wheel_tf: false
